<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>info.opplipo.cn</title>
  <meta name="description" content="独立开发的多款 APP 介绍与下载">
  <meta property="og:title" content="info.opplipo.cn">
  <meta property="og:description" content="独立开发的多款 APP 介绍与下载">
  <meta property="og:type" content="website">
  <link rel="stylesheet" href="/assets/styles.css">
</head>
<body>
  <main class="page">
    <header class="site-header">
      <h1 class="site-title">我的 APP</h1>
      <p class="site-tagline">独立开发，持续更新。</p>
    </header>

    
    <section class="carousel-hero" data-featured-carousel tabindex="0" aria-roledescription="carousel" aria-label="推荐 APP">
      <div class="carousel-hero__track">
        
        <article class="carousel-hero__slide" style="--c1:#fbbf24; --c2:#f472b6;" data-slide-index="0" aria-roledescription="slide" aria-label="示例 APP">
          <div class="carousel-hero__body">
            <div class="carousel-hero__icon"><img src="apps/_sample/icon.svg" alt="示例 APP"></div>
            <div class="carousel-hero__meta">
              <div class="carousel-hero__cat">
                示例
                
              </div>
              <h2 class="carousel-hero__name">示例 APP</h2>
              <p class="carousel-hero__tagline">这是一个示例 APP，部署后会替换为你的真实作品</p>
              <div class="carousel-hero__expected">预计 Q3 2026 上线</div>
              <a class="cta cta--primary" href="https://github.com/lipopo">加入内测 →</a>
            </div>
          </div>
          <div class="carousel-hero__media">
            <img src="apps/_sample/screenshots/1.svg" alt="示例 APP 截图">
            
          </div>
        </article>
        
      </div>
      <button class="carousel-hero__arrow carousel-hero__arrow--prev" aria-label="上一张" type="button">‹</button>
      <button class="carousel-hero__arrow carousel-hero__arrow--next" aria-label="下一张" type="button">›</button>
      <div class="carousel-hero__dots" role="tablist" aria-label="选择幻灯片">
        
        <button class="carousel-hero__dot carousel-hero__dot--active" role="tab" data-dot-index="0" aria-label="幻灯片 0"></button>
        
      </div>
    </section>
    

    

    
    <section class="coming-soon">
      <div class="block__label">即将上线 · COMING SOON</div>
      <div class="coming-soon__grid">
        
          
            <a class="card card--small" href="/apps/_sample/">
              <div class="card__icon"><img src="apps/_sample/icon.svg" alt="示例 APP"></div>
              <div class="card__body">
                <div class="card__name">示例 APP</div>
                <div class="card__category">示例</div>
                <div class="coming-soon__when">目标 Q3 2026</div>
                <p class="card__tagline">这是一个示例 APP，部署后会替换为你的真实作品</p>
              </div>
            </a>
          
        
      </div>
    </section>
    

    <footer class="site-footer">
      <p>© lipo · 站点部署于 GitHub Pages</p>
      <p class="site-footer__contact"><a href="mailto:lipo8081@gmail.com">Contact · lipo8081@gmail.com</a></p>
    </footer>
  </main>
  <script type="module" src="/assets/app.js"></script>
</body>
</html>
